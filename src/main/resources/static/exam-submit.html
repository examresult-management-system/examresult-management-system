<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submit Exam | ExamPortal</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>

<body>

<!-- SIDEBAR -->
<aside class="sidebar">

  <div style="padding:20px">

    <h2>ExamPortal</h2>
    <p>Student Panel</p>

    <nav style="margin-top:30px">

      <a href="/student-dashboard.html">Dashboard</a><br><br>

      <a href="/exams.html">My Exams</a><br><br>

      <a href="/exam-submit.html">Submit Exam</a><br><br>

      <a href="/timetables.html">Timetable</a><br><br>

      <a href="/results.html">Results</a><br><br>

      <a href="/announcements.html">Announcements</a><br><br>

      <a href="/profile.html">Profile</a><br><br>

      <button onclick="logout()">Logout</button>

    </nav>

  </div>

</aside>

<div class="sidebar-backdrop"></div>

<div class="main-wrapper">

  <!-- TOP NAVBAR -->
  <nav class="top-navbar">

    <div style="padding:15px 24px; display:flex; justify-content:space-between; align-items:center">

      <strong>Submit Exam</strong>

      <button onclick="logout()" class="btn btn-secondary btn-sm">
        Logout
      </button>

    </div>

  </nav>

  <!-- MAIN CONTENT -->
  <main class="main-content">

    <div class="card">

      <div class="card-header">

        <h3>Exam Submission Form</h3>

      </div>

      <div class="card-body">

        <form id="examSubmitForm">

          <!-- EXAM -->
          <div class="form-group">

            <label for="examTitle">
              Exam Title
            </label>

            <input
                    type="text"
                    class="form-control"
                    id="examTitle"
                    placeholder="Enter exam title"
            >

          </div>

          <!-- SUBJECT -->
          <div class="form-group">

            <label for="examSubject">
              Subject / Module
            </label>

            <input
                    type="text"
                    class="form-control"
                    id="examSubject"
                    placeholder="Enter module name"
            >

          </div>

          <!-- ANSWER -->
          <div class="form-group">

            <label for="examAnswer">
              Your Answer
            </label>

            <textarea
                    class="form-control"
                    id="examAnswer"
                    rows="10"
                    placeholder="Write your answer here..."
            ></textarea>

          </div>

          <!-- FILE -->
          <div class="form-group">

            <label for="examFile">
              Upload File
            </label>

            <input
                    type="file"
                    class="form-control"
                    id="examFile"
            >

          </div>

          <!-- SUBMIT -->
          <div class="form-group">

            <button
                    type="submit"
                    class="btn btn-primary"
            >

              <i class="fas fa-paper-plane"></i>
              Submit Exam

            </button>

          </div>

        </form>

      </div>

    </div>

  </main>

</div>

<!-- TOAST -->
<div class="toast-container" id="toastContainer"></div>

<!-- SPINNER -->
<div class="spinner-overlay" id="spinnerOverlay">

  <div class="spinner"></div>

</div>

<!-- AUTH CHECK -->
<script>

  const token = localStorage.getItem("token");
  const user = localStorage.getItem("user");

  if (!token || !user) {

    window.location.href = "/login.html";

  }

  // SHOW SUCCESS MESSAGE
  document
          .getElementById("examSubmitForm")
          .addEventListener("submit", function(event) {

            event.preventDefault();

            alert("Exam submitted successfully!");

          });

  // LOGOUT
  function logout() {

    localStorage.removeItem("token");
    localStorage.removeItem("user");

    window.location.href = "/login.html";

  }

</script>

</body>
</html>
