<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Announcements | ExamPortal</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>

<body>

<aside class="sidebar" id="sidebar"></aside>
<div class="sidebar-backdrop"></div>

<div class="main-wrapper">

  <nav class="top-navbar" id="topNavbar"></nav>

  <main class="main-content">

    <div class="page-toolbar">
      <div></div>

      <div class="toolbar-filters">
        <button class="btn btn-primary" id="addAnnouncementBtn" style="display:none;">
          <i class="fas fa-plus"></i>
          New Announcement
        </button>
      </div>
    </div>

    <div id="announcementsContainer"></div>

  </main>

</div>

<div class="modal-overlay" id="announcementModalOverlay">
  <div class="modal modal-lg">

    <div class="modal-header">
      <h3 id="announcementModalTitle">New Announcement</h3>

      <button class="modal-close" id="announcementModalClose">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <div class="modal-body">
      <form id="announcementForm">

        <input type="hidden" id="announcementId">

        <div class="form-group">
          <label for="annTitle">Title</label>
          <input
                  type="text"
                  class="form-control"
                  id="annTitle"
                  placeholder="Enter announcement title"
                  required
          >
        </div>

        <div class="form-group">
          <label for="annContent">Content</label>
          <textarea
                  class="form-control"
                  id="annContent"
                  rows="8"
                  placeholder="Write your announcement..."
                  required
          ></textarea>
        </div>

        <div class="form-group">
          <label for="annPriority">Priority</label>
          <select class="form-control" id="annPriority">
            <option value="Normal">Normal</option>
            <option value="High">High</option>
          </select>
        </div>

      </form>
    </div>

    <div class="modal-footer">
      <button class="btn btn-secondary" id="announcementCancel">
        Cancel
      </button>

      <button class="btn btn-primary" id="announcementSave">
        Post Announcement
      </button>
    </div>

  </div>
</div>

<div class="modal-overlay" id="deleteModalOverlay">
  <div class="modal modal-sm">

    <div class="modal-body text-center">
      <div class="delete-icon">
        <i class="fas fa-exclamation-triangle"></i>
      </div>

      <h3>Confirm Delete</h3>
      <p>Are you sure you want to delete this announcement?</p>
    </div>

    <div class="modal-footer justify-center">
      <button class="btn btn-secondary" id="deleteCancel">
        Cancel
      </button>

      <button class="btn btn-danger" id="deleteConfirm">
        Delete
      </button>
    </div>

  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<div class="spinner-overlay" id="spinnerOverlay">
  <div class="spinner"></div>
</div>

<script src="js/api.js"></script>
<script src="js/main.js"></script>
<script src="js/announcements.js"></script>

</body>
</html>
