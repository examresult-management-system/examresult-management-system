<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Exam | ExamPortal</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/create-exam.css">
</head>

<body>

<aside class="sidebar" id="sidebar"></aside>
<div class="sidebar-backdrop"></div>

<div class="main-wrapper">

    <nav class="top-navbar" id="topNavbar"></nav>

    <main class="main-content create-exam-page">

        <div class="create-exam-card">

            <div class="create-exam-header">
                <h1>Create Exam</h1>
                <p>Create PDF or poll exams for students.</p>
            </div>

            <form id="createExamForm">

                <div class="form-grid">

                    <div class="form-group">
                        <label>Subject Name</label>
                        <input type="text" id="subject" class="form-control" placeholder="Enter subject name" required>
                    </div>

                    <div class="form-group">
                        <label>Module Code</label>
                        <input type="text" id="moduleCode" class="form-control" placeholder="Enter module code" required>
                    </div>

                    <div class="form-group">
                        <label>Faculty</label>
                        <select id="faculty" class="form-control" required>
                            <option value="">Loading faculties...</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Exam Type</label>
                        <select id="examType" class="form-control" required>
                            <option value="">Select Exam Type</option>
                            <option value="PDF">PDF Exam</option>
                            <option value="POLL">Poll Exam</option>
                        </select>
                    </div>

                    <div class="form-group full-width">
                        <label>Enrollment Key</label>
                        <input type="text" id="enrollmentKey" class="form-control" placeholder="Enter enrollment key" required>
                    </div>

                    <div class="form-group">
                        <label>Exam Date</label>
                        <input type="date" id="examDate" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label>Exam Start Time</label>
                        <input type="time" id="examTime" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label>Duration Hours</label>
                        <input type="number" id="duration" class="form-control" min="1" value="1" required>
                    </div>

                </div>

                <div id="pdfSection" class="dynamic-section" style="display:none;">
                    <h3>
                        <i class="fas fa-file-pdf"></i>
                        Upload PDF Exam
                    </h3>

                    <div class="form-group">
                        <label>Upload PDF</label>
                        <input type="file" id="pdfFile" class="form-control" accept="application/pdf">
                    </div>
                </div>

                <div id="pollSection" class="dynamic-section" style="display:none;">
                    <h3>
                        <i class="fas fa-list-check"></i>
                        Poll Questions
                    </h3>

                    <div class="form-group">
                        <label>How many questions?</label>
                        <input type="number" id="questionCount" class="form-control" min="1" placeholder="Enter number of questions">
                    </div>

                    <button type="button" class="secondary-btn" id="generateQuestionsBtn">
                        <i class="fas fa-plus"></i>
                        Generate Questions
                    </button>

                    <div id="questionsContainer"></div>
                </div>

                <div class="form-actions">
                    <a href="lecturer-dashboard.html" class="cancel-btn">Cancel</a>

                    <button type="submit" class="primary-btn">
                        <i class="fas fa-save"></i>
                        Save Exam
                    </button>
                </div>

            </form>

        </div>

    </main>

</div>

<div class="toast-container" id="toastContainer"></div>

<div class="spinner-overlay" id="spinnerOverlay">
    <div class="spinner"></div>
</div>

<script src="js/api.js"></script>
<script src="js/main.js"></script>
<script src="js/create-exam.js"></script>

</body>
</html>
