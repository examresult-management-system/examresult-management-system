<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Lecturers | ExamPortal</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"><link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/dashboard.css"></head><body>
<aside class="sidebar" id="sidebar"></aside><div class="main-wrapper"><nav class="top-navbar" id="topNavbar"></nav><main class="main-content">
<div class="page-toolbar"><div class="toolbar-search"><div class="navbar-search" style="width:100%"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Search lecturers..."></div></div><div class="toolbar-filters"><select id="facultyFilter" class="form-control"><option value="">All Faculties</option></select><select id="statusFilter" class="form-control"><option value="">All Status</option><option value="Active">Active</option><option value="Inactive">Inactive</option></select><button class="btn btn-primary" id="addLecturerBtn"><i class="fas fa-plus"></i> Add Lecturer</button></div></div>
<div class="card"><div class="card-header"><h3>Manage Lecturers</h3><p>Admin can add, edit, and delete lecturer accounts. Login user is synced automatically.</p></div><div class="table-wrapper"><table class="data-table"><thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Department</th><th>Faculty</th><th>Status</th><th>Actions</th></tr></thead><tbody id="lecturersBody"></tbody></table></div><div class="pagination" id="lecturersPagination"></div></div>
</main></div>
<div class="modal-overlay" id="lecturerModalOverlay"><div class="modal"><div class="modal-header"><h3 id="lecturerModalTitle">Add Lecturer</h3><button class="modal-close" id="lecturerModalClose"><i class="fas fa-times"></i></button></div><div class="modal-body"><form id="lecturerForm"><input type="hidden" id="lecturerId"><div class="form-group"><label>Full Name</label><input class="form-control" id="lecturerName" type="text"></div><div class="form-group"><label>Email</label><input class="form-control" id="lecturerEmail" type="email"></div><div class="form-group"><label>Department</label><input class="form-control" id="lecturerDepartment" type="text"></div><div class="form-group"><label>Faculty</label><input class="form-control" id="lecturerFaculty" type="text" value="Computing Faculty"></div><div class="form-group"><label>Status</label><select class="form-control" id="lecturerStatus"><option value="Active">Active</option><option value="Inactive">Inactive</option></select></div></form></div><div class="modal-footer"><button class="btn btn-secondary" id="lecturerCancel">Cancel</button><button class="btn btn-primary" id="lecturerSave">Save Lecturer</button></div></div></div>
<div class="modal-overlay" id="deleteModalOverlay"><div class="modal modal-sm"><div class="modal-body text-center"><div class="delete-icon"><i class="fas fa-exclamation-triangle"></i></div><h3>Confirm Delete</h3><p>This will delete the lecturer and their login account.</p></div><div class="modal-footer justify-center"><button class="btn btn-secondary" id="deleteCancel">Cancel</button><button class="btn btn-danger" id="deleteConfirm">Delete</button></div></div></div>
<div class="toast-container" id="toastContainer"></div><div class="spinner-overlay" id="spinnerOverlay"><div class="spinner"></div></div>
<script src="js/api.js"></script><script src="js/main.js"></script><script src="js/lecturers.js"></script></body></html>
