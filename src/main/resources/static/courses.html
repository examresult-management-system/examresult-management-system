<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Courses | ExamPortal</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>

<body>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar"></aside>

<div class="sidebar-backdrop"></div>

<div class="main-wrapper">

  <!-- TOP NAVBAR -->
  <nav class="top-navbar" id="topNavbar"></nav>

  <!-- MAIN CONTENT -->
  <main class="main-content">

    <!-- TOOLBAR -->
    <div class="page-toolbar">

      <div class="toolbar-search">

        <div class="navbar-search" style="width:100%">

          <i class="fas fa-search"></i>

          <input
                  type="text"
                  id="searchInput"
                  placeholder="Search courses..."
          >

        </div>

      </div>

      <div class="toolbar-filters">

        <select id="facultyFilter" class="form-control"><option value="">All Faculties</option></select>

        <button class="btn btn-primary" id="addCourseBtn">

          <i class="fas fa-plus"></i>
          Add Course

        </button>

      </div>

    </div>

    <!-- COURSES TABLE -->
    <div class="card">

      <div class="table-wrapper">

        <table class="data-table">

          <thead>

          <tr>
            <th>ID</th>
            <th>Course Name</th>
            <th>Faculty</th>
            <th>Duration</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>

          </thead>

          <tbody id="coursesBody">

          <tr>
            <td>1</td>
            <td>BSc Computer Science</td>
            <td>Computing</td>
            <td>4 Years</td>
            <td>Active</td>
            <td>
              <button class="btn btn-sm btn-primary">Edit</button>
            </td>
          </tr>

          </tbody>

        </table>

      </div>

      <div class="pagination" id="coursesPagination"></div>

    </div>

  </main>

</div>

<!-- COURSE MODAL -->
<div class="modal-overlay" id="courseModalOverlay">

  <div class="modal">

    <div class="modal-header">

      <h3 id="courseModalTitle">
        Add Course
      </h3>

      <button class="modal-close" id="courseModalClose">

        <i class="fas fa-times"></i>

      </button>

    </div>

    <div class="modal-body">

      <form id="courseForm">

        <input type="hidden" id="courseId">

        <div class="form-group">

          <label for="courseCode">Course Code</label>

          <input type="text" class="form-control" id="courseCode" placeholder="e.g., CS101">
        </div>
        <div class="form-group">
          <label for="courseName">Course Name</label>
          <input type="text" class="form-control" id="courseName" placeholder="Enter course name">

        </div>

        <div class="form-group">

          <label for="courseFaculty">Faculty</label>

          <select class="form-control" id="courseFaculty"><option value="">Select Faculty</option></select>

        </div>

        <div class="form-group">
          <label for="courseCredits">Credits</label>
          <input type="number" class="form-control" id="courseCredits" placeholder="120">
        </div>

        <div class="form-group">

          <label for="courseDuration">Duration</label>

          <input
                  type="text"
                  class="form-control"
                  id="courseDuration"
                  placeholder="e.g., 4 Years"
          >

        </div>

        <div class="form-group">

          <label for="courseStatus">Status</label>

          <select class="form-control" id="courseStatus">

            <option value="Active">Active</option>

            <option value="Inactive">Inactive</option>

          </select>

        </div>

      </form>

    </div>

    <div class="modal-footer">

      <button class="btn btn-secondary" id="courseCancel">
        Cancel
      </button>

      <button class="btn btn-primary" id="courseSave">
        Save Course
      </button>

    </div>

  </div>

</div>

<!-- DELETE MODAL -->
<div class="modal-overlay" id="deleteModalOverlay">

  <div class="modal modal-sm">

    <div class="modal-body text-center">

      <div class="delete-icon">

        <i class="fas fa-exclamation-triangle"></i>

      </div>

      <h3>Confirm Delete</h3>

      <p>
        Are you sure you want to delete this course?
      </p>

    </div>

    <div class="modal-footer justify-center">

      <button class="btn btn-secondary" id="deleteCancel">
        Cancel
      </button>

      <button class="btn btn-danger" id="deleteConfirm">
        Delete
      </button>

    </div>

  </div>

</div>

<!-- TOAST -->
<div class="toast-container" id="toastContainer"></div>

<!-- SPINNER -->
<div class="spinner-overlay" id="spinnerOverlay">

  <div class="spinner"></div>

</div>

<!-- AUTH CHECK -->
<script>
const token=localStorage.getItem('token');const userText=localStorage.getItem('user');if(!token||!userText){window.location.href='login.html'}try{const u=JSON.parse(userText);if(u.role)localStorage.setItem('userRole',u.role.toUpperCase());if(String(u.role||'').toUpperCase()!=='ADMIN')window.location.href='login.html'}catch(e){localStorage.clear();window.location.href='login.html'}
</script>
<script src="js/api.js"></script>
<script src="js/main.js"></script>
<script src="js/courses.js"></script>

</body>
</html>
