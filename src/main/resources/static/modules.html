<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modules | ExamPortal</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>

<body>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar"></aside>

<div class="sidebar-backdrop"></div>

<div class="main-wrapper">

  <!-- TOP NAVBAR -->
  <nav class="top-navbar" id="topNavbar"></nav>

  <!-- MAIN CONTENT -->
  <main class="main-content">

    <!-- TOOLBAR -->
    <div class="page-toolbar">

      <div class="toolbar-search">

        <div class="navbar-search" style="width:100%">

          <i class="fas fa-search"></i>

          <input
                  type="text"
                  id="searchInput"
                  placeholder="Search modules..."
          >

        </div>

      </div>

      <div class="toolbar-filters">

        <select id="courseFilter" class="form-control"><option value="">All Courses</option></select>

        <button class="btn btn-primary" id="addModuleBtn">

          <i class="fas fa-plus"></i>
          Add Module

        </button>

      </div>

    </div>

    <!-- MODULE TABLE -->
    <div class="card">

      <div class="table-wrapper">

        <table class="data-table">

          <thead>

          <tr>
            <th>ID</th>
            <th>Module Name</th>
            <th>Course</th>
            <th>Lecturer</th>
            <th>Credits</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>

          </thead>

          <tbody id="modulesBody">

          <tr>
            <td>1</td>
            <td>Database Systems</td>
            <td>BSc Computer Science</td>
            <td>Dr. Alan Turing</td>
            <td>4</td>
            <td>Active</td>
            <td>
              <button class="btn btn-sm btn-primary">
                Edit
              </button>
            </td>
          </tr>

          <tr>
            <td>2</td>
            <td>Software Engineering</td>
            <td>BSc Computer Science</td>
            <td>Dr. Grace Hopper</td>
            <td>3</td>
            <td>Active</td>
            <td>
              <button class="btn btn-sm btn-primary">
                Edit
              </button>
            </td>
          </tr>

          </tbody>

        </table>

      </div>

      <div class="pagination" id="modulesPagination"></div>

    </div>

  </main>

</div>

<!-- MODULE MODAL -->
<div class="modal-overlay" id="moduleModalOverlay">

  <div class="modal">

    <div class="modal-header">

      <h3 id="moduleModalTitle">
        Add Module
      </h3>

      <button class="modal-close" id="moduleModalClose">

        <i class="fas fa-times"></i>

      </button>

    </div>

    <div class="modal-body">

      <form id="moduleForm">

        <input type="hidden" id="moduleId">

        <div class="form-group">

          <label for="moduleCode">Module Code</label>
          <input type="text" class="form-control" id="moduleCode" placeholder="e.g., CSM101">
        </div>
        <div class="form-group">
          <label for="moduleName">Module Name</label>

          <input
                  type="text"
                  class="form-control"
                  id="moduleName"
                  placeholder="Enter module name"
          >

        </div>

        <div class="form-group">

          <label for="moduleCourse">
            Course
          </label>

          <select class="form-control" id="moduleCourse"><option value="">Select Course</option></select>

        </div>

        <div class="form-group">

          <label for="moduleLecturer">
            Lecturer
          </label>

          <select class="form-control" id="moduleLecturer"><option value="">Select Lecturer</option></select>

        </div>

        <div class="form-group">

          <label for="moduleCredits">
            Credits
          </label>

          <input
                  type="number"
                  class="form-control"
                  id="moduleCredits"
                  placeholder="Enter credits"
          >

        </div>

        <div class="form-group">

          <label for="moduleStatus">
            Status
          </label>

          <select class="form-control" id="moduleStatus">

            <option value="Active">Active</option>

            <option value="Inactive">Inactive</option>

          </select>

        </div>

      </form>

    </div>

    <div class="modal-footer">

      <button class="btn btn-secondary" id="moduleCancel">
        Cancel
      </button>

      <button class="btn btn-primary" id="moduleSave">
        Save Module
      </button>

    </div>

  </div>

</div>

<!-- DELETE MODAL -->
<div class="modal-overlay" id="deleteModalOverlay">

  <div class="modal modal-sm">

    <div class="modal-body text-center">

      <div class="delete-icon">

        <i class="fas fa-exclamation-triangle"></i>

      </div>

      <h3>Confirm Delete</h3>

      <p>
        Are you sure you want to delete this module?
      </p>

    </div>

    <div class="modal-footer justify-center">

      <button class="btn btn-secondary" id="deleteCancel">
        Cancel
      </button>

      <button class="btn btn-danger" id="deleteConfirm">
        Delete
      </button>

    </div>

  </div>

</div>

<!-- TOAST -->
<div class="toast-container" id="toastContainer"></div>

<!-- SPINNER -->
<div class="spinner-overlay" id="spinnerOverlay">

  <div class="spinner"></div>

</div>

<!-- AUTH CHECK -->
<script>
const token=localStorage.getItem('token');const userText=localStorage.getItem('user');if(!token||!userText){window.location.href='login.html'}try{const u=JSON.parse(userText);if(u.role)localStorage.setItem('userRole',u.role.toUpperCase());if(String(u.role||'').toUpperCase()!=='ADMIN')window.location.href='login.html'}catch(e){localStorage.clear();window.location.href='login.html'}
</script>
<script src="js/api.js"></script>
<script src="js/main.js"></script>
<script src="js/modules.js"></script>

</body>
</html>
