<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timetables | ExamPortal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<div class="sidebar-backdrop"></div>

<div class="main-wrapper">
  <nav class="top-navbar" id="topNavbar"></nav>
  <main class="main-content">
    <div class="page-toolbar">
      <div>
        <h1 id="timetableHeading">Timetables</h1>
        <p id="timetableSubtitle" style="color:var(--text-muted);margin-top:6px">View timetable entries.</p>
      </div>
      <div class="toolbar-filters" id="adminTimetableActions" style="display:none">
        <button class="btn btn-primary" id="addTimetableBtn"><i class="fas fa-plus"></i> Add Timetable</button>
      </div>
    </div>

    <div class="card">
      <div class="table-wrapper">
        <table class="data-table">
          <thead>
          <tr>
            <th>Day</th><th>Time</th><th>Module Code</th><th>Module</th><th>Room</th><th>Lecturer</th><th>For</th><th>Assigned Email</th><th>Semester</th><th class="admin-only-col">Actions</th>
          </tr>
          </thead>
          <tbody id="timetablesBody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="timetableModalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="timetableModalTitle">Add Timetable</h3>
      <button class="modal-close" id="timetableModalClose"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <form id="timetableForm">
        <input type="hidden" id="timetableId">
        <div class="form-row">
          <div class="form-group"><label>Target User Type</label><select class="form-control" id="targetRole"><option value="STUDENT">Student</option><option value="LECTURER">Lecturer</option><option value="ALL">All Users</option></select></div>
          <div class="form-group"><label>Assigned Email</label><input class="form-control" id="targetEmail" placeholder="student@exam.com or lecturer@exam.com"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Day</label><select class="form-control" id="day"><option>Monday</option><option>Tuesday</option><option>Wednesday</option><option>Thursday</option><option>Friday</option><option>Saturday</option><option>Sunday</option></select></div>
          <div class="form-group"><label>Semester</label><input class="form-control" id="semester" placeholder="Semester 1"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Start Time</label><input type="time" class="form-control" id="startTime"></div>
          <div class="form-group"><label>End Time</label><input type="time" class="form-control" id="endTime"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Module Code</label><input class="form-control" id="moduleCode" placeholder="SE101"></div>
          <div class="form-group"><label>Module Name</label><input class="form-control" id="moduleName" placeholder="Software Engineering"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Room / Hall</label><input class="form-control" id="hall" placeholder="Lab 01"></div>
          <div class="form-group"><label>Lecturer</label><input class="form-control" id="lecturer" placeholder="PDF Lecturer"></div>
        </div>
        <div class="modal-footer"><button type="button" class="btn btn-secondary" id="timetableCancel">Cancel</button><button type="submit" class="btn btn-primary">Save Timetable</button></div>
      </form>
    </div>
  </div>
</div>

<div class="modal-overlay" id="deleteModalOverlay"><div class="modal modal-sm"><div class="modal-header"><h3>Delete timetable?</h3></div><div class="modal-body"><p>This timetable entry will be permanently removed.</p></div><div class="modal-footer"><button class="btn btn-secondary" id="deleteCancel">Cancel</button><button class="btn btn-danger" id="deleteConfirm">Delete</button></div></div></div>
<div class="toast-container" id="toastContainer"></div>
<div class="spinner-overlay" id="spinnerOverlay"><div class="spinner"></div></div>

<script>
const token=localStorage.getItem('token');const userText=localStorage.getItem('user');if(!token||!userText){window.location.href='login.html'}try{const u=JSON.parse(userText);if(u.role)localStorage.setItem('userRole',u.role.toUpperCase())}catch(e){localStorage.clear();window.location.href='login.html'}
</script>
<script src="js/api.js"></script><script src="js/main.js"></script><script src="js/timetables.js"></script>
</body>
</html>
