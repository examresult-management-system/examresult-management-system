<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faculties | ExamPortal</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>

<body>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar"></aside>

<div class="sidebar-backdrop"></div>

<div class="main-wrapper">

  <!-- TOP NAVBAR -->
  <nav class="top-navbar" id="topNavbar"></nav>

  <!-- MAIN CONTENT -->
  <main class="main-content">

    <!-- TOOLBAR -->
    <div class="page-toolbar">

      <div class="toolbar-search">

        <div class="navbar-search" style="width:100%">

          <i class="fas fa-search"></i>

          <input
                  type="text"
                  id="searchInput"
                  placeholder="Search faculties..."
          >

        </div>

      </div>

      <div class="toolbar-filters">

        <button class="btn btn-primary" id="addFacultyBtn">

          <i class="fas fa-plus"></i>
          Add Faculty

        </button>

      </div>

    </div>

    <!-- FACULTY TABLE -->
    <div class="card">

      <div class="table-wrapper">

        <table class="data-table">

          <thead>

          <tr>
            <th>ID</th>
            <th>Faculty Name</th>
            <th>Description</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>

          </thead>

          <tbody id="facultiesBody">

          <tr>
            <td>1</td>
            <td>Faculty of Computing</td>
            <td>Computer Science and IT</td>
            <td>Active</td>
            <td>
              <button class="btn btn-sm btn-primary">Edit</button>
            </td>
          </tr>

          <tr>
            <td>2</td>
            <td>Faculty of Engineering</td>
            <td>Engineering and Technology</td>
            <td>Active</td>
            <td>
              <button class="btn btn-sm btn-primary">Edit</button>
            </td>
          </tr>

          </tbody>

        </table>

      </div>

      <div class="pagination" id="facultiesPagination"></div>

    </div>

  </main>

</div>

<!-- FACULTY MODAL -->
<div class="modal-overlay" id="facultyModalOverlay">

  <div class="modal">

    <div class="modal-header">

      <h3 id="facultyModalTitle">
        Add Faculty
      </h3>

      <button class="modal-close" id="facultyModalClose">

        <i class="fas fa-times"></i>

      </button>

    </div>

    <div class="modal-body">

      <form id="facultyForm">

        <input type="hidden" id="facultyId">

        <div class="form-group">

          <label for="facultyName">
            Faculty Name
          </label>

          <input
                  type="text"
                  class="form-control"
                  id="facultyName"
                  placeholder="Enter faculty name"
          >

        </div>

        <div class="form-group">

          <label for="facultyDescription">
            Description
          </label>

          <textarea
                  class="form-control"
                  id="facultyDescription"
                  rows="5"
                  placeholder="Enter faculty description"
          ></textarea>

        </div>

        <div class="form-group">

          <label for="facultyStatus">
            Status
          </label>

          <select class="form-control" id="facultyStatus">

            <option value="Active">Active</option>

            <option value="Inactive">Inactive</option>

          </select>

        </div>

      </form>

    </div>

    <div class="modal-footer">

      <button class="btn btn-secondary" id="facultyCancel">
        Cancel
      </button>

      <button class="btn btn-primary" id="facultySave">
        Save Faculty
      </button>

    </div>

  </div>

</div>

<!-- DELETE MODAL -->
<div class="modal-overlay" id="deleteModalOverlay">

  <div class="modal modal-sm">

    <div class="modal-body text-center">

      <div class="delete-icon">

        <i class="fas fa-exclamation-triangle"></i>

      </div>

      <h3>Confirm Delete</h3>

      <p>
        Are you sure you want to delete this faculty?
      </p>

    </div>

    <div class="modal-footer justify-center">

      <button class="btn btn-secondary" id="deleteCancel">
        Cancel
      </button>

      <button class="btn btn-danger" id="deleteConfirm">
        Delete
      </button>

    </div>

  </div>

</div>

<!-- TOAST -->
<div class="toast-container" id="toastContainer"></div>

<!-- SPINNER -->
<div class="spinner-overlay" id="spinnerOverlay">

  <div class="spinner"></div>

</div>

<!-- AUTH CHECK -->
<script>
const token=localStorage.getItem('token');const userText=localStorage.getItem('user');if(!token||!userText){window.location.href='login.html'}try{const u=JSON.parse(userText);if(u.role)localStorage.setItem('userRole',u.role.toUpperCase());if(String(u.role||'').toUpperCase()!=='ADMIN')window.location.href='login.html'}catch(e){localStorage.clear();window.location.href='login.html'}
</script>
<script src="js/api.js"></script>
<script src="js/main.js"></script>
<script src="js/faculties.js"></script>

</body>
</html>
