<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | ExamPortal</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>

<body class="auth-page">

<div class="auth-container">

  <div class="auth-logo">
    <i class="fas fa-graduation-cap"></i>
    <h1>ExamPortal</h1>
    <p>University Exam Management System</p>
  </div>

  <div class="auth-card">

    <h2>Reset Password</h2>

    <p class="auth-subtitle">
      Enter your email address and we will help you reset your password.
    </p>

    <form class="auth-form" id="forgotForm" autocomplete="off">

      <div class="form-group">

        <label for="email">
          Email Address
        </label>

        <div class="input-wrapper">

          <i class="fas fa-envelope"></i>

          <input
                  type="email"
                  class="form-control"
                  id="email"
                  name="email"
                  placeholder="Enter your email"
                  autocomplete="off"
                  required
          >

        </div>

      </div>

      <button type="submit" class="btn btn-primary auth-btn">
        Send Reset Link
      </button>

    </form>

    <div class="auth-footer">

      <p>
        Remember your password?
        <a href="/login.html">Sign in</a>
      </p>

      <p>
        Don't have an account?
        <a href="/register.html">Register</a>
      </p>

    </div>

  </div>

</div>

<div class="toast-container" id="toastContainer"></div>

<div class="spinner-overlay" id="spinnerOverlay">
  <div class="spinner"></div>
</div>

<script>

  document
          .getElementById("forgotForm")
          .addEventListener("submit", function(event) {

            event.preventDefault();

            const email = document.getElementById("email").value.trim();

            if (!email) {
              alert("Please enter your email address.");
              return;
            }

            alert("Password reset feature is not connected yet. Please contact admin.");

            window.location.href = "/login.html";
          });

</script>

</body>
</html>
