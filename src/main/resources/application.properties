spring.application.name=portal

# Default DB: embedded persistent H2. This makes the system run immediately with no MySQL setup.
spring.datasource.url=jdbc:h2:file:./data/exam_portal;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=8080

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Clean old demo/random users from MySQL on startup and create only one admin, one lecturer, one student.
# After the first successful run, you can set this to false if you want newly added users to survive restarts.
exam.seed.clean-users-on-start=true
